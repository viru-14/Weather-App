<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h2>Weather App</h2>

    <nav>
        <a href="#">Dashboard</a>
        <a href="#">Map</a>
        <a href="#">Education</a>
        <a href="#">Historical</a>
    </nav>

    <button id="theme-toggle">🌙</button>
</header>

<div class="container">

    <main>

        <section class="search-section">
            <input
                type="text"
                id="city-input"
                placeholder="Search for a city..."
            >
            <button id="search-button">Search</button>
            <button id="reset-button">Reset</button> 
        </section>

        <p id="loading" class="hidden">Loading...</p>
        <p id="error" class="hidden"></p>

        <section class="weather-card card">

            <div class="weather-left">
                <h3 id="city-name">Search a city</h3>

                <p id="date">--</p>

                <h1 id="temperature">--°C</h1>

                <p id="condition">Current Weather</p>
            </div>

            <div class="weather-right">

                <div class="stat-card">
                    Humidity:
                    <span id="humidity">--</span>
                </div>

                <div class="stat-card">
                    Wind Speed:
                    <span id="wind-speed">--</span>
                </div>

                <div class="stat-card">
                    Pressure:
                    <span id="pressure">N/A</span>
                </div>

            </div>

        </section>

        <section class="forecast" id="forecast-container">
            <div class="forecast-card card">Today</div>
            <div class="forecast-card card">Tue</div>
            <div class="forecast-card card">Wed</div>
            <div class="forecast-card card">Thu</div>
            <div class="forecast-card card">Fri</div>
        </section>

        <section class="hourly-card card">

            <h3>Hourly Micro-Data Insights</h3>
            <div id="hourly-container">
                <div class="row">
                    <span>--</span>
                    <span>--</span>
                    <span>--</span>
                </div>
            </div>

        </section>

    </main>

    <footer>
        <div>
            <h3>Weather App</h3>
        </div>

        <div>
            Privacy Policy |
            Terms of Service
        </div>
    </footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
